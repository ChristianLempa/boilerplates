---
kind: compose
metadata:
  icon:
    provider: simple-icons
    id: uptimekuma
  name: Uptimekuma
  description: |
    Uptimekuma is a self-hosted monitoring tool that allows you to keep track of the uptime and performance of your websites and services.
  version: 2.1.3
  author: Christian Lempa
  date: '2026-03-03'
  tags: [
    monitoring,
    uptime,
    self-hosted,
    docker
  ]
schema: '1.2'
spec:
  general:
    vars:
      service_name:
        type: str
        default: uptimekuma
        required: true
      container_timezone:
        type: str
        default: UTC
        required: true
      restart_policy:
        type: enum
        options:
          - unless-stopped
          - always
          - on-failure
          - 'no'
        default: unless-stopped
        required: true
  ports:
    vars:
      ports_http:
        type: int
        default: 3001
        required: false
  traefik:
    vars:
      traefik_host:
        type: str
        default: uptimekuma
        required: false
      traefik_network:
        default: traefik
        type: str
        required: true
      traefik_domain:
        default: home.arpa
        type: str
        required: true
      traefik_enabled:
        type: bool
        default: false
        description: Enable Traefik integration
        required: false
    toggle: traefik_enabled
    title: Traefik
    description: Configure Traefik reverse proxy integration
  traefik_tls:
    vars:
      traefik_tls_certresolver:
        type: str
        default: cloudflare
        required: true
      traefik_tls_enabled:
        type: bool
        default: false
        description: Enable Traefik TLS
        required: false
    toggle: traefik_tls_enabled
    title: Traefik TLS
    description: Configure Traefik TLS/SSL certificates
    needs: [
      "traefik_enabled=true"
    ]
  database:
    vars:
      database_type:
        type: enum
        options:
        - sqlite
        - mariadb
        default: sqlite
        description: Database backend type
        required: true
      database_external:
        type: bool
        default: false
        description: Use external database
        required: false
        needs:
        - database_type=mariadb
      database_name:
        type: str
        default: uptimekuma
        description: Database name
        required: false
        needs:
        - database_type=mariadb
      database_user:
        type: str
        default: uptimekuma
        description: Database user
        required: false
        needs:
        - database_type=mariadb
      database_password:
        type: str
        sensitive: true
        autogenerated: true
        description: Database password
        required: false
        needs:
        - database_type=mariadb
      database_host:
        type: str
        default: mariadb
        description: Database host
        required: true
        needs:
        - database_type=mariadb;database_external=true
      database_port:
        type: int
        default: 3306
        description: Database port
        required: false
        needs:
        - database_type=mariadb
